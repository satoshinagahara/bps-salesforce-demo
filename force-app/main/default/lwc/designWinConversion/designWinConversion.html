<template>
    <lightning-card title="Design Win → 販売契約" icon-name="standard:contract">
        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-text-align_center">
                <lightning-spinner size="small"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <template if:true={error}>
                <div class="slds-p-around_medium slds-text-color_error">{error}</div>
            </template>

            <template if:true={preview}>
                <!-- Status message -->
                <template if:true={hasStatus}>
                    <div class="status-msg">{statusMessage}</div>
                </template>

                <!-- Product summary -->
                <template if:true={hasProducts}>
                    <div class="product-list">
                        <div class="list-header">変換対象製品（予測データより）</div>
                        <template for:each={products} for:item="p">
                            <div key={p.key} class="product-row">
                                <span class="prod-name">{p.productName}</span>
                                <span class="prod-detail">
                                    単価 {p.unitPrice} ／ 合計数量 {p.totalQty} ／ 合計金額 {p.totalAmt}
                                </span>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Convert button -->
                <div class="slds-p-around_small slds-text-align_center">
                    <lightning-button
                        label={buttonLabel}
                        variant="brand"
                        onclick={handleOpenModal}
                        disabled={convertDisabled}
                        icon-name="utility:forward">
                    </lightning-button>
                </div>
            </template>
        </template>
    </lightning-card>

    <!-- Modal -->
    <template if:true={showModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={handleCloseModal}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title">販売契約への変換</h2>
                </div>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="slds-m-bottom_small">
                        <strong>{preview.oppName}</strong> を販売契約に変換します。
                    </p>
                    <p class="slds-m-bottom_medium desc-text">
                        契約期間を指定してください。月別スケジュール（空の箱）が自動作成されます。
                    </p>
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col">
                            <lightning-input
                                type="date"
                                label="契約開始日"
                                value={contractStart}
                                onchange={handleStartChange}
                                required>
                            </lightning-input>
                        </div>
                        <div class="slds-col">
                            <lightning-input
                                type="date"
                                label="契約終了日"
                                value={contractEnd}
                                onchange={handleEndChange}
                                required>
                            </lightning-input>
                        </div>
                    </div>

                    <!-- Preview in modal -->
                    <template if:true={hasProducts}>
                        <div class="modal-products">
                            <div class="list-header">作成される契約製品</div>
                            <template for:each={products} for:item="p">
                                <div key={p.key} class="product-row">
                                    <span class="prod-name">{p.productName}</span>
                                    <span class="prod-detail">単価 {p.unitPrice}</span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="キャンセル" onclick={handleCloseModal}></lightning-button>
                    <lightning-button
                        label="変換実行"
                        variant="brand"
                        onclick={handleConvert}
                        disabled={isConvertDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
