<template>
    <lightning-card title="ニーズ分析ダッシュボード" icon-name="standard:insights">

        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="読み込み中" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_medium">{error}</div>
        </template>

        <template if:false={isLoading}>
            <!-- Segment toggle -->
            <div class="segment-bar">
                <template for:each={segmentOptions} for:item="seg">
                    <button key={seg.value} class={seg.cls} data-value={seg.value} onclick={handleSegmentToggle}>{seg.label}</button>
                </template>
            </div>

            <!-- Controls: Time filter + Metric toggle -->
            <div class="controls-bar">
                <div class="control-group">
                    <span class="control-label">期間</span>
                    <template for:each={timeFilterOptions} for:item="opt">
                        <button key={opt.value} class={opt.cls} data-value={opt.value} onclick={handleTimeFilter}>{opt.label}</button>
                    </template>
                </div>
                <div class="control-group">
                    <span class="control-label">指標</span>
                    <button class={metricCountClass} data-metric="count" onclick={handleMetricToggle}>件数</button>
                    <button class={metricImpactClass} data-metric="impact" onclick={handleMetricToggle}>金額</button>
                </div>
            </div>

            <!-- KPI Summary -->
            <div class="kpi-summary">
                <div class="kpi-card">
                    <div class="kpi-value">{totalCount}</div>
                    <div class="kpi-label">ニーズカード</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">{totalImpactFormatted}</div>
                    <div class="kpi-label">ビジネスインパクト</div>
                </div>
                <div class="kpi-card">
                    <div class="freshness-counts-v2">
                        <span class="freshness-num-v2">{freshCount}</span>
                        <span class="freshness-sep-v2">/</span>
                        <span class="freshness-num-v2">{agingCount}</span>
                        <span class="freshness-sep-v2">/</span>
                        <span class="freshness-num-v2">{staleCount}</span>
                    </div>
                    <div class="kpi-label">鮮度（3M以内 / 3-6M / 6M超）</div>
                </div>
            </div>

            <!-- Tab navigation -->
            <div class="tab-bar">
                <button class={productIndustryTabClass} data-tab="productIndustry" onclick={handleTabClick}>製品 × 業種</button>
                <button class={productNeedTypeTabClass} data-tab="productNeedType" onclick={handleTabClick}>製品 × 種別</button>
                <button class={industryNeedTypeTabClass} data-tab="industryNeedType" onclick={handleTabClick}>業種 × 種別</button>
            </div>

            <!-- Chart area -->
            <div class="chart-area">
                <div class="chart-hints">
                    <span class="chart-hint">
                        <template if:true={isMatrixTab}>セルをクリックするとAIが分析します</template>
                        <template if:false={isMatrixTab}>バーをクリックするとAIが分析します</template>
                    </span>
                </div>

                <!-- 1. 製品Family -->
                <template if:true={isProductFamilyChart}>
                    <div class="chart-container">
                        <template for:each={productFamilyItems} for:item="item">
                            <div key={item.key} class="bar-row" data-type="productFamily" data-value={item.fullLabel} onclick={handleBarClick}>
                                <div class="bar-label" title={item.fullLabel}>{item.label}</div>
                                <div class="bar-track" style={item.barStyle}>
                                    <div class="bar-segment" style={item.freshStyle}></div>
                                    <div class="bar-segment" style={item.agingStyle}></div>
                                    <div class="bar-segment" style={item.staleStyle}></div>
                                </div>
                                <div class="bar-count" title={item.freshnessTitle}>
                                    {item.displayValue}
                                    <template if:true={item.showPct}><span class="bar-pct">({item.pct}%)</span></template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- 2. 製品×種別 (matrix) -->
                <template if:true={isProductNeedTypeChart}>
                    <template if:true={isDrilled}>
                        <div class="drill-breadcrumb">
                            <button class="drill-back-btn" onclick={handleDrillBack}>← 製品ファミリー一覧</button>
                            <span class="drill-current">{drillBreadcrumb}</span>
                        </div>
                    </template>
                    <div class="cross-container">
                        <table class="cross-table">
                            <thead>
                                <tr>
                                    <th class="cross-corner">製品 ＼ 種別</th>
                                    <template for:each={productNeedTypeMatrix.headers} for:item="h">
                                        <th key={h.key} class="cross-header" title={h.fullLabel}>{h.label}</th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={productNeedTypeMatrix.rows} for:item="row">
                                    <tr key={row.key}>
                                        <td class="cross-row-label cross-row-label--drillable" title={row.fullRowLabel}
                                            data-family={row.key} onclick={handleRowLabelClick}>{row.rowLabel}</td>
                                        <template for:each={row.cells} for:item="cell">
                                            <td key={cell.key}
                                                class={cell.cellClass}
                                                style={cell.cellStyle}
                                                data-key={cell.key}
                                                data-count={cell.count}
                                                data-filtertype={cell.filterType}
                                                onclick={handleCellClick}>
                                                <template if:true={cell.hasData}>{cell.displayText}</template>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- 3. 製品×業種 (matrix) -->
                <template if:true={isProductIndustryChart}>
                    <template if:true={isDrilled}>
                        <div class="drill-breadcrumb">
                            <button class="drill-back-btn" onclick={handleDrillBack}>← 製品ファミリー一覧</button>
                            <span class="drill-current">{drillBreadcrumb}</span>
                        </div>
                    </template>
                    <div class="cross-container">
                        <table class="cross-table">
                            <thead>
                                <tr>
                                    <th class="cross-corner">製品 ＼ 業種</th>
                                    <template for:each={productIndustryMatrix.headers} for:item="h">
                                        <th key={h.key} class="cross-header" title={h.fullLabel}>{h.label}</th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={productIndustryMatrix.rows} for:item="row">
                                    <tr key={row.key}>
                                        <td class="cross-row-label cross-row-label--drillable" title={row.fullRowLabel}
                                            data-family={row.key} onclick={handleRowLabelClick}>{row.rowLabel}</td>
                                        <template for:each={row.cells} for:item="cell">
                                            <td key={cell.key}
                                                class={cell.cellClass}
                                                style={cell.cellStyle}
                                                data-key={cell.key}
                                                data-count={cell.count}
                                                data-filtertype={cell.filterType}
                                                onclick={handleCellClick}>
                                                <template if:true={cell.hasData}>{cell.displayText}</template>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- 4. 業種×種別 (matrix) -->
                <template if:true={isIndustryNeedTypeChart}>
                    <div class="cross-container">
                        <table class="cross-table">
                            <thead>
                                <tr>
                                    <th class="cross-corner">業種 ＼ 種別</th>
                                    <template for:each={industryNeedTypeMatrix.headers} for:item="h">
                                        <th key={h.key} class="cross-header" title={h.fullLabel}>{h.label}</th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={industryNeedTypeMatrix.rows} for:item="row">
                                    <tr key={row.key}>
                                        <td class="cross-row-label" title={row.fullRowLabel}>{row.rowLabel}</td>
                                        <template for:each={row.cells} for:item="cell">
                                            <td key={cell.key}
                                                class={cell.cellClass}
                                                style={cell.cellStyle}
                                                data-key={cell.key}
                                                data-count={cell.count}
                                                data-filtertype={cell.filterType}
                                                onclick={handleCellClick}>
                                                <template if:true={cell.hasData}>{cell.displayText}</template>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- 5. 顧客Top -->
                <template if:true={isAccountChart}>
                    <div class="chart-container">
                        <template for:each={accountItems} for:item="item">
                            <div key={item.key} class="bar-row" data-type="account" data-value={item.fullLabel} onclick={handleBarClick}>
                                <div class="bar-label" title={item.fullLabel}>{item.label}</div>
                                <div class="bar-track" style={item.barStyle}>
                                    <div class="bar-segment" style={item.freshStyle}></div>
                                    <div class="bar-segment" style={item.agingStyle}></div>
                                    <div class="bar-segment" style={item.staleStyle}></div>
                                </div>
                                <div class="bar-count" title={item.freshnessTitle}>
                                    {item.displayValue}
                                    <template if:true={item.showPct}><span class="bar-pct">({item.pct}%)</span></template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- AI Insight Panel: Loading -->
            <template if:true={isAnalyzing}>
                <div class="insight-panel">
                    <div class="insight-header">
                        <h3 class="insight-title">{insightTitle}</h3>
                    </div>
                    <div class="analysis-waiting">
                        <template if:true={analysisSummary}>
                            <div class="waiting-summary">
                                <div class="waiting-summary-row">
                                    <span class="waiting-label">分析対象</span>
                                    <span class="waiting-value waiting-value-primary">{analysisSummary.target}</span>
                                </div>
                                <div class="waiting-summary-row">
                                    <span class="waiting-label">ニーズカード</span>
                                    <span class="waiting-value">{analysisSummary.cardCount}件を送信</span>
                                </div>
                            </div>
                        </template>
                        <div class="waiting-indicator">
                            <span class="css-spinner-sm"></span>
                            <span class="waiting-text">Salesforce Prompt Builder (Claude 4.6 Sonnet) が分析しています</span>
                        </div>
                    </div>
                </div>
            </template>

            <!-- AI Insight Panel: Results -->
            <template if:true={hasInsight}>
                <div class="insight-panel">
                    <div class="insight-header">
                        <h3 class="insight-title">{insightTitle}</h3>
                        <div class="insight-actions">
                            <template if:true={fromCache}>
                                <span class="cache-badge" title="キャッシュから取得">cached {cachedAtFormatted}</span>
                            </template>
                            <button class="refresh-btn" onclick={handleRefreshAnalysis} title="最新データで再分析">↻</button>
                            <button class="close-btn" onclick={handleCloseInsight}>✕</button>
                        </div>
                    </div>
                    <div class="insight-body">
                        <template for:each={insightLines} for:item="line">
                            <p key={line.key} class={line.className}>{line.text}</p>
                        </template>
                    </div>
                    <!-- 施策ドラフト -->
                    <template if:true={initiativeReady}>
                        <div class="initiative-draft">
                            <div class="draft-header">
                                <span class="draft-badge">AI Draft</span>
                                <span class="draft-title-text">施策ドラフトが完成しました</span>
                                <button class="initiative-btn" onclick={handleCreateInitiative}>施策を確認・作成</button>
                            </div>
                            <div class="draft-preview">
                                <div class="draft-field">
                                    <span class="draft-label">タイトル</span>
                                    <span class="draft-value">{initTitle}</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Initiative Creation Modal -->
            <template if:true={showInitiativeModal}>
                <section class="slds-modal slds-fade-in-open modal-override">
                    <div class="slds-modal__container">
                        <div class="modal-header">
                            <h2 class="modal-title">施策を起案</h2>
                            <button class="close-btn" onclick={handleCloseModal}>✕</button>
                        </div>
                        <div class="modal-body">
                            <template if:true={isSuggesting}>
                                <div class="modal-loading">
                                    <lightning-spinner alternative-text="AI提案生成中" size="small"></lightning-spinner>
                                    <p class="modal-loading-text">AIがニーズデータから施策を提案しています...</p>
                                </div>
                            </template>
                            <template if:false={isSuggesting}>
                                <div class="modal-info">{initCardLabel}</div>
                                <div class="modal-form">
                                    <lightning-input
                                        label="施策タイトル"
                                        value={initTitle}
                                        onchange={handleInitTitleChange}
                                        required>
                                    </lightning-input>
                                    <div class="modal-row">
                                        <lightning-combobox
                                            label="製品"
                                            value={initProductId}
                                            options={initProductOptions}
                                            onchange={handleInitProductChange}
                                            class="modal-half">
                                        </lightning-combobox>
                                        <lightning-combobox
                                            label="優先度"
                                            value={initPriority}
                                            options={priorityOptions}
                                            onchange={handleInitPriorityChange}
                                            class="modal-half">
                                        </lightning-combobox>
                                    </div>
                                    <lightning-textarea
                                        label="概要（What）"
                                        value={initWhat}
                                        onchange={handleInitWhatChange}
                                        max-length="10000">
                                    </lightning-textarea>
                                    <lightning-textarea
                                        label="根拠（Why）"
                                        value={initWhy}
                                        onchange={handleInitWhyChange}
                                        max-length="10000">
                                    </lightning-textarea>
                                </div>
                            </template>
                        </div>
                        <div class="modal-footer">
                            <button class="slds-button slds-button_neutral" onclick={handleCloseModal}>キャンセル</button>
                            <button class="slds-button slds-button_brand" onclick={handleSaveInitiative}
                                    disabled={isCreating}>
                                <template if:true={isCreating}>作成中...</template>
                                <template if:false={isCreating}>作成</template>
                            </button>
                        </div>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

        </template>
    </lightning-card>
</template>
