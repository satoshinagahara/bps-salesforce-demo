<template>
    <div class="renderer-container">
        <!-- ヘッダー -->
        <div class="slds-box slds-theme_shade slds-m-bottom_small">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div>
                    <h2 class="slds-text-heading_small slds-text-color_default">
                        <lightning-icon icon-name="standard:opportunity" size="small" class="slds-m-right_x-small"></lightning-icon>
                        類似商談分析
                    </h2>
                    <template lwc:if={userQuery}>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                            質問: {userQuery}
                        </p>
                    </template>
                </div>
                <lightning-badge label={similarCount} class="slds-badge_inverse"></lightning-badge>
            </div>
        </div>

        <!-- 類似商談カード一覧 -->
        <template lwc:if={hasSimilarOpps}>
            <div class="slds-grid slds-wrap slds-gutters_x-small slds-m-bottom_small">
                <template for:each={similarOpportunities} for:item="opp">
                    <div key={opp.name} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_x-small">
                        <div class={opp.cardClass}>
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                                <span class="slds-text-title_bold slds-truncate" title={opp.name}>{opp.name}</span>
                                <template lwc:if={opp.isWon}>
                                    <lightning-badge label="受注" class="slds-theme_success"></lightning-badge>
                                </template>
                            </div>
                            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small">{opp.accountName}</p>
                            <lightning-badge label={opp.matchReason} class="slds-m-bottom_xx-small"></lightning-badge>

                            <div class="slds-grid slds-wrap slds-m-top_xx-small tag-container">
                                <template lwc:if={opp.dealType}>
                                    <span class="slds-badge slds-badge_lightest slds-m-right_xx-small slds-m-bottom_xx-small">{opp.dealType}</span>
                                </template>
                                <template lwc:if={opp.salesMotion}>
                                    <span class="slds-badge slds-badge_lightest slds-m-right_xx-small slds-m-bottom_xx-small">{opp.salesMotion}</span>
                                </template>
                                <template lwc:if={opp.competitiveSituation}>
                                    <span class="slds-badge slds-badge_lightest slds-m-right_xx-small slds-m-bottom_xx-small">{opp.competitiveSituation}</span>
                                </template>
                            </div>

                            <template lwc:if={opp.lessons}>
                                <div class="slds-box slds-box_xx-small slds-theme_default slds-m-top_xx-small lessons-box">
                                    <p class="slds-text-body_small">
                                        <lightning-icon icon-name="utility:light_bulb" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                        {opp.lessons}
                                    </p>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- AIインサイト（折りたたみ） -->
        <template lwc:if={reportText}>
            <div class="slds-box slds-theme_default">
                <button class="slds-button slds-button_neutral slds-button_stretch"
                        onclick={toggleInsights}>
                    <lightning-icon icon-name={insightsIcon} size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    AIインサイト {insightsToggleLabel}
                </button>
                <template lwc:if={showInsights}>
                    <div class="slds-m-top_small report-text">
                        <template for:each={reportSections} for:item="section">
                            <div key={section.key} class="slds-m-bottom_small">
                                <template lwc:if={section.isHeading}>
                                    <h3 class="slds-text-heading_small slds-m-top_small slds-m-bottom_xx-small">{section.text}</h3>
                                </template>
                                <template lwc:if={section.isSubHeading}>
                                    <h4 class="slds-text-title_bold slds-m-top_x-small">{section.text}</h4>
                                </template>
                                <template lwc:if={section.isParagraph}>
                                    <p class="slds-text-body_regular">{section.text}</p>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
