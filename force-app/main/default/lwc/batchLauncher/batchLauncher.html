<template>
    <lightning-card title="バッチ処理ランチャー" icon-name="standard:process">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template for:each={batches} for:item="batch">
                <div key={batch.name} class="slds-box slds-m-bottom_small">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-grow">
                            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_xx-small">
                                <lightning-icon icon-name={batch.iconName} size="small" class="slds-m-right_small"></lightning-icon>
                                <h3 class="slds-text-heading_small">{batch.label}</h3>
                            </div>
                            <p class="slds-text-body_small slds-text-color_weak">{batch.description}</p>
                            <template if:true={batch.statusMessage}>
                                <p class="slds-m-top_xx-small">
                                    <lightning-badge label={batch.statusMessage} class={batch.statusClass}></lightning-badge>
                                </p>
                            </template>
                        </div>
                        <div class="slds-col slds-no-flex slds-m-left_medium">
                            <lightning-button
                                variant="brand"
                                label="実行"
                                data-batch-name={batch.name}
                                onclick={handleLaunch}
                                disabled={batch.isRunning}
                            ></lightning-button>
                        </div>
                    </div>
                </div>
            </template>
            <template if:true={isEmpty}>
                <p class="slds-text-color_weak">利用可能なバッチ処理はありません。</p>
            </template>
        </div>
    </lightning-card>
</template>
