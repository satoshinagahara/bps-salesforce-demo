<template>
    <lightning-card title="提案書アップロード" icon-name="standard:document">
        <!-- ファイルアップロードエリア -->
        <div class="slds-p-around_medium">
            <!-- ドラッグ&ドロップエリア -->
            <div
                class={dropZoneClass}
                ondragover={handleDragOver}
                ondragleave={handleDragLeave}
                ondrop={handleDrop}
            >
                <div class="slds-file-selector__body">
                    <lightning-icon
                        icon-name="utility:upload"
                        size="large"
                        alternative-text="アップロード"
                        class="slds-m-bottom_small"
                    ></lightning-icon>
                    <p class="slds-text-body_regular slds-m-bottom_x-small">
                        ファイルをドラッグ&ドロップ
                    </p>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                        または
                    </p>
                    <lightning-button
                        label="ファイルを選択"
                        variant="neutral"
                        onclick={handleFileSelectClick}
                        disabled={isProcessing}
                    ></lightning-button>
                    <input
                        type="file"
                        class="file-input slds-hide"
                        accept=".pptx,.pdf"
                        onchange={handleFileChange}
                    />
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                        対応形式: PPTX, PDF
                    </p>
                </div>
            </div>

            <!-- 選択済みファイル情報 -->
            <template lwc:if={selectedFile}>
                <div class="slds-m-top_medium slds-box slds-box_x-small slds-theme_default">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-grow">
                            <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                                <lightning-icon
                                    icon-name={fileIconName}
                                    size="small"
                                    class="slds-m-right_x-small"
                                ></lightning-icon>
                                <div>
                                    <p class="slds-text-body_regular slds-text-title_bold">{selectedFile.name}</p>
                                    <p class="slds-text-body_small slds-text-color_weak">{formattedFileSize}</p>
                                </div>
                            </div>
                        </div>
                        <div class="slds-col slds-shrink">
                            <lightning-button-icon
                                icon-name="utility:close"
                                alternative-text="削除"
                                variant="bare"
                                onclick={handleRemoveFile}
                                disabled={isProcessing}
                            ></lightning-button-icon>
                        </div>
                    </div>
                </div>
            </template>

            <!-- アップロード開始ボタン -->
            <template lwc:if={showUploadButton}>
                <div class="slds-m-top_medium slds-text-align_center">
                    <lightning-button
                        label="アップロード開始"
                        variant="brand"
                        onclick={handleUpload}
                        disabled={isProcessing}
                        icon-name="utility:upload"
                    ></lightning-button>
                </div>
            </template>

            <!-- プログレス表示 -->
            <template lwc:if={isProcessing}>
                <div class="slds-m-top_medium">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                        <lightning-spinner
                            alternative-text="処理中"
                            size="small"
                            class="slds-m-right_small spinner-inline"
                        ></lightning-spinner>
                        <p class="slds-text-body_regular">{statusMessage}</p>
                    </div>
                    <template lwc:if={showProgressBar}>
                        <lightning-progress-bar
                            value={uploadProgress}
                            size="large"
                            variant="circular"
                        ></lightning-progress-bar>
                    </template>
                </div>
            </template>

            <!-- エラー表示 -->
            <template lwc:if={errorMessage}>
                <div class="slds-m-top_medium slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">エラー</span>
                    <p class="slds-text-body_regular">{errorMessage}</p>
                </div>
            </template>
        </div>

        <!-- 既存レコード一覧 -->
        <template lwc:if={hasProposalContexts}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small slds-p-top_small slds-border_top">
                    アップロード済み提案書
                </h3>
                <lightning-datatable
                    key-field="Id"
                    data={proposalContexts}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column
                ></lightning-datatable>
            </div>
        </template>

        <!-- レコードなし表示 -->
        <template lwc:if={showEmptyState}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-border_top slds-p-top_small">
                    <p class="slds-text-body_small slds-text-color_weak slds-text-align_center">
                        この商談にはまだ提案書がアップロードされていません
                    </p>
                </div>
            </div>
        </template>
    </lightning-card>
</template>
